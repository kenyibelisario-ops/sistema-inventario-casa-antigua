<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - Casa Antigua</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-900 min-h-screen flex flex-col justify-center items-center p-4">

    <div class="bg-white w-full max-w-md p-8 rounded-2xl shadow-2xl border border-slate-200">
        
        <div class="text-center mb-8">
            <span class="text-2xl font-black tracking-wider text-slate-900 block">CASA ANTIGUA</span>
            <span class="text-[10px] bg-slate-100 text-slate-600 px-2.5 py-1 rounded-md font-mono uppercase tracking-widest border border-slate-200 inline-block mt-2">Control de Acceso</span>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="bg-amber-50 text-amber-800 p-3.5 rounded-xl text-xs font-bold uppercase tracking-wide mb-5 border border-amber-200/60 text-center">
                  ⚠️ {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="space-y-5">
            <div class="flex flex-col space-y-1.5">
                <label class="text-xs font-semibold text-slate-700 uppercase tracking-wider">Usuario / Identificador</label>
                <input type="text" name="usuario" placeholder="Ej: admin" class="p-3.5 bg-slate-50 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white transition-all shadow-sm" required>
            </div>

            <div class="flex flex-col space-y-1.5">
                <label class="text-xs font-semibold text-slate-700 uppercase tracking-wider">Contraseña de Acceso</label>
                <input type="password" name="password" placeholder="••••••••" class="p-3.5 bg-slate-50 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white transition-all shadow-sm" required>
            </div>

            <button type="submit" class="w-full bg-slate-950 hover:bg-slate-800 text-amber-400 font-black text-xs uppercase tracking-widest py-4 rounded-xl transition-all shadow-lg transform active:scale-[0.98] border border-slate-800">
                Ingresar al Sistema →
            </button>
        </form>

        <div class="mt-6 pt-4 border-t border-slate-100 text-[10px] text-slate-400 text-center space-y-1">
            <p>Admin: <span class="font-mono text-slate-600 font-bold">admin</span> | Clave: <span class="font-mono text-slate-600 font-bold">1234</span></p>
            <p>Operario: <span class="font-mono text-slate-600 font-bold">operario</span> | Clave: <span class="font-mono text-slate-600 font-bold">5678</span></p>
        </div>
    </div>

</body>
</html>
